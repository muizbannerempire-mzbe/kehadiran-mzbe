<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Kehadiran MBE</title>

    <!-- Memuatkan Tailwind CSS untuk reka bentuk -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Memuatkan React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Memuatkan Babel untuk memproses kod React dalam browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Memuatkan Firebase (Versi Compat untuk HTML standalone) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // IKON-IKON (Menggantikan perpustakaan luar)
        // ==========================================
        const IconUser = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconShieldCheck = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconMapPin = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconClock = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconCalendar = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconCheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconXCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
        const IconTrash2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconLogOut = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconAlertTriangle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const IconPlay = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>;

        // ==========================================
        // KONFIGURASI FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA20Va8z_pTNvo1d6v3T0GZSJz7nSMTTiU",
            authDomain: "kehadiran-web.firebaseapp.com",
            projectId: "kehadiran-web",
            storageBucket: "kehadiran-web.firebasestorage.app",
            messagingSenderId: "57438014766",
            appId: "1:57438014766:web:63730481e6d649a9393ebf"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ==========================================
        // APLIKASI UTAMA
        // ==========================================
        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [usernameInput, setUsernameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            
            const [leaves, setLeaves] = useState([]);
            const [attendances, setAttendances] = useState([]);

            const users = [
                { id: 'MZBEBOSS001', password: 'admin', name: 'MUIZZUDDIN BIN AB.LLAH', role: 'admin' },
                { id: 'MZBE072022', password: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', role: 'pekerja' },
                { id: 'MZBE082022', password: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', role: 'pekerja' },
                { id: 'MZBE092022', password: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', role: 'pekerja' },
                { id: 'MZBE102022', password: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', role: 'pekerja' },
                { id: 'MZBE012024', password: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', role: 'pekerja' },
                { id: 'MZBE022024', password: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', role: 'pekerja' },
                { id: 'MZBE022025', password: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', role: 'pekerja' },
                { id: 'MZBE032025', password: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', role: 'pekerja' },
                { id: 'MZBE042025', password: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', role: 'pekerja' }
            ];

            const [storeLocation, setStoreLocation] = useState({ lat: 5.76981, lng: 102.56142 }); 
            const [bypassGps, setBypassGps] = useState(false); 
            const [modalMsg, setModalMsg] = useState(null);

            useEffect(() => {
                auth.signInAnonymously().catch((error) => console.error("Ralat Auth:", error));
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setFirebaseUser(user);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;

                const unsubLeaves = db.collection('leaves').onSnapshot(snapshot => {
                    setLeaves(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubAtt = db.collection('attendances').onSnapshot(snapshot => {
                    setAttendances(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsDbReady(true);
                });

                return () => { unsubLeaves(); unsubAtt(); };
            }, [firebaseUser]);

            function getToday() { return new Date().toLocaleDateString('en-CA'); }
            function getCurrentTime() { return new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true }); }
            
            function getDistanceInMeters(lat1, lon1, lat2, lon2) {
                const R = 6371e3; 
                const p1 = lat1 * Math.PI/180;
                const p2 = lat2 * Math.PI/180;
                const dp = (lat2-lat1) * Math.PI/180;
                const dl = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            }

            const verifyLocationAndExecute = (actionName, callback) => {
                if (bypassGps) { callback(); return; }
                if (!navigator.geolocation) {
                    setModalMsg({ type: 'error', text: 'Sistem GPS tidak disokong pada peranti anda.' });
                    return;
                }
                setModalMsg({ type: 'info', text: 'Sedang mengesahkan lokasi anda...' });
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const dist = getDistanceInMeters(position.coords.latitude, position.coords.longitude, storeLocation.lat, storeLocation.lng);
                        if (dist <= 150) {
                            setModalMsg(null);
                            callback();
                        } else {
                            setModalMsg({ type: 'error', text: `Jarak anda: ${Math.round(dist)} meter dari kedai. Mesti di dalam radius 150 meter untuk ${actionName}.` });
                        }
                    },
                    (error) => { setModalMsg({ type: 'error', text: 'Gagal mendapatkan lokasi GPS. Pastikan Location dibenarkan dalam pelayar web anda.' }); },
                    { enableHighAccuracy: true }
                );
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if(!isDbReady) {
                    setLoginError('Sistem sedang menyambung. Sila tunggu...');
                    return;
                }
                const user = users.find(u => u.id === usernameInput.trim().toUpperCase() && u.password === passwordInput);
                if (user) {
                    setCurrentUser(user);
                    setUsernameInput('');
                    setPasswordInput('');
                    setLoginError('');
                } else {
                    setLoginError('ID Pengguna atau Kata Laluan salah.');
                }
            };

            // KOMPONEN LOGO BERFUNGSI PENUH UNTUK HTML STANDALONE
            const BrandLogo = ({ size = "large" }) => (
                <div className={`flex flex-col items-center justify-center ${size === 'large' ? 'mb-8' : 'mb-0 shrink-0'}`}>
                    <img 
                        src="./logo.png" 
                        alt="Muiz Banner Empire" 
                        style={{ height: size === 'large' ? '120px' : '42px', width: 'auto', maxWidth: '100%', objectFit: 'contain' }}
                        className={size === 'large' ? 'mb-3 drop-shadow-md' : 'bg-white rounded-lg p-1 shadow-sm'}
                        onError={(e) => {
                            e.target.onerror = null; 
                            e.target.src = "https://placehold.co/100x100/2563eb/ffffff?text=MBE";
                        }}
                    />
                    {size === 'large' && (
                        <div className="text-center mt-3">
                            <h1 className="text-2xl font-black text-gray-800 tracking-tight">MUIZ BANNER</h1>
                            <p className="text-sm font-bold text-gray-500 tracking-widest uppercase">Empire</p>
                        </div>
                    )}
                </div>
            );

            // PAPARAN LOG MASUK
            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
                            
                            <BrandLogo size="large" />
                            
                            <form onSubmit={handleLogin} className="space-y-5">
                                {loginError && (
                                    <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm text-center font-medium border border-red-200">
                                        {loginError}
                                    </div>
                                )}
                                
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">ID Pengguna</label>
                                    <input 
                                        type="text" 
                                        value={usernameInput}
                                        onChange={(e) => setUsernameInput(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:ring-0 focus:border-blue-500 outline-none uppercase transition-colors"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">Kata Laluan</label>
                                    <input 
                                        type="password" 
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:ring-0 focus:border-blue-500 outline-none transition-colors"
                                        required
                                    />
                                </div>

                                <button 
                                    type="submit" 
                                    className={`w-full py-3.5 px-4 rounded-xl text-white font-bold transition-all shadow-lg flex items-center justify-center gap-2 mt-4 ${!isDbReady ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}
                                    disabled={!isDbReady}
                                >
                                    {isDbReady ? 'Log Masuk Sistem' : 'Menyambung...'}
                                </button>
                            </form>
                            {/* Teks bantuan telah dibuang seperti yang diminta */}
                        </div>
                    </div>
                );
            }

            // AHALA KE DASHBOARD ADMIN ATAU PEKERJA
            if (currentUser.role === 'admin') {
                return <AdminDashboard 
                    currentUser={currentUser} setCurrentUser={setCurrentUser}
                    leaves={leaves} attendances={attendances} users={users}
                    storeLocation={storeLocation} setStoreLocation={setStoreLocation}
                    bypassGps={bypassGps} setBypassGps={setBypassGps} BrandLogo={BrandLogo}
                />;
            }

            return <EmployeeDashboard 
                currentUser={currentUser} setCurrentUser={setCurrentUser}
                leaves={leaves} attendances={attendances}
                verifyLocationAndExecute={verifyLocationAndExecute}
                modalMsg={modalMsg} setModalMsg={setModalMsg}
                getToday={getToday} getCurrentTime={getCurrentTime} BrandLogo={BrandLogo}
            />;
        }

        // ==========================================
        // PANEL ADMIN
        // ==========================================
        function AdminDashboard({ currentUser, setCurrentUser, leaves, attendances, users, storeLocation, setStoreLocation, bypassGps, setBypassGps, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);
            const [deleteAttConfirmId, setDeleteAttConfirmId] = useState(null);

            const handleStatusCuti = async (id, status) => {
                try { await db.collection('leaves').doc(id).update({ status }); } 
                catch (e) { alert("Ralat kemaskini: " + e.message); }
            };

            const executeDeleteCuti = async (id) => {
                try { await db.collection('leaves').doc(id).delete(); setDeleteConfirmId(null); } 
                catch (e) { alert("Ralat padam: " + e.message); }
            };

            const executeDeleteAttendance = async (id) => {
                try { await db.collection('attendances').doc(id).delete(); setDeleteAttConfirmId(null); } 
                catch (e) { alert("Ralat padam kehadiran: " + e.message); }
            };

            const setLocationToCurrent = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setStoreLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                        alert("Lokasi kedai berjaya dikemaskini ke lokasi anda sekarang!");
                    });
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    <div className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <BrandLogo size="small" />
                            <div>
                                <h1 className="font-bold text-lg leading-tight">Panel Admin</h1>
                                <p className="text-xs text-blue-100 truncate w-40">{currentUser.name}</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-blue-700 rounded-full hover:bg-blue-800 transition-colors">
                            <IconLogOut size={18} />
                        </button>
                    </div>

                    <div className="p-4 max-w-4xl mx-auto space-y-6">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                            <button onClick={() => setTab('cuti')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'cuti' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>Cuti</button>
                            <button onClick={() => setTab('kehadiran')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'kehadiran' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>Kehadiran</button>
                            <button onClick={() => setTab('tetapan')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'tetapan' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>Sistem</button>
                        </div>

                        {tab === 'cuti' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-gray-700 flex items-center gap-2"><IconCalendar size={20}/> Permohonan Cuti</h2>
                                {leaves.length === 0 ? <p className="text-gray-500 text-center py-8 bg-white rounded-xl border border-dashed">Tiada rekod cuti.</p> :
                                [...leaves].reverse().map(leave => {
                                    const user = users.find(u => u.id === leave.userId);
                                    return (
                                        <div key={leave.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <h3 className="font-bold text-gray-800 text-lg">{user?.name}</h3>
                                                    <p className="text-sm text-gray-500">{leave.date} • <span className="font-bold text-blue-600">{leave.type}</span></p>
                                                </div>
                                                <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase ${leave.status === 'Lulus' ? 'bg-green-100 text-green-700' : leave.status === 'Ditolak' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>{leave.status}</span>
                                            </div>
                                            <p className="text-sm text-gray-600 bg-gray-50 p-3 rounded-xl border border-gray-100 mb-4"><span className="font-bold">Sebab:</span> {leave.reason}</p>
                                            <div className="flex gap-2 border-t border-gray-100 pt-4">
                                                {leave.status === 'Pending' && (
                                                    <>
                                                        <button onClick={() => handleStatusCuti(leave.id, 'Lulus')} className="flex-1 bg-green-50 text-green-600 py-2.5 rounded-xl text-sm font-bold hover:bg-green-100 flex justify-center items-center gap-2"><IconCheckCircle size={18}/> Lulus</button>
                                                        <button onClick={() => handleStatusCuti(leave.id, 'Ditolak')} className="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-bold hover:bg-red-100 flex justify-center items-center gap-2"><IconXCircle size={18}/> Tolak</button>
                                                    </>
                                                )}
                                                {deleteConfirmId === leave.id ? (
                                                    <div className="flex-1 flex gap-2">
                                                        <button onClick={() => executeDeleteCuti(leave.id)} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-red-700">Pasti Padam?</button>
                                                        <button onClick={() => setDeleteConfirmId(null)} className="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-bold hover:bg-gray-300">Batal</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setDeleteConfirmId(leave.id)} className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl text-sm font-bold hover:bg-gray-200 flex justify-center items-center gap-2"><IconTrash2 size={18}/> Padam</button>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        {tab === 'kehadiran' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-gray-700 flex items-center gap-2"><IconClock size={20}/> Rekod Kehadiran</h2>
                                {attendances.length === 0 ? <p className="text-gray-500 text-center py-8 bg-white rounded-xl border border-dashed">Tiada rekod kehadiran.</p> : 
                                [...attendances].reverse().map((att, idx) => {
                                    const user = users.find(u => u.id === att.userId);
                                    return (
                                        <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 text-sm">
                                            <div className="font-bold text-gray-800 mb-3 border-b border-gray-100 pb-3 flex justify-between items-center">
                                                <span className="text-base">{user?.name}</span>
                                                <span className="text-gray-500 bg-gray-100 px-2 py-1 rounded-md font-medium text-xs">{att.date}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-y-3 gap-x-4 text-gray-600">
                                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="font-bold">Masuk:</span> <span className="font-medium text-gray-900">{att.clockIn || '-'}</span></div>
                                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="font-bold">Keluar:</span> <span className="font-medium text-gray-900">{att.clockOut || '-'}</span></div>
                                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="font-bold">K. Rehat:</span> <span className="font-medium text-gray-900">{att.breakOut || '-'}</span></div>
                                                <div className="flex justify-between border-b border-gray-50 pb-1"><span className="font-bold">M. Rehat:</span> <span className="font-medium text-gray-900">{att.breakIn || '-'}</span></div>
                                                <div className="flex justify-between text-purple-700 bg-purple-50 p-1.5 rounded-lg"><span className="font-bold">OT Masuk:</span> <span>{att.otIn || '-'}</span></div>
                                                <div className="flex justify-between text-purple-700 bg-purple-50 p-1.5 rounded-lg"><span className="font-bold">OT Keluar:</span> <span>{att.otOut || '-'}</span></div>
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-gray-100 flex justify-end">
                                                {deleteAttConfirmId === att.id ? (
                                                    <div className="flex gap-2 w-full">
                                                        <button onClick={() => executeDeleteAttendance(att.id)} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-red-700">Pasti Padam?</button>
                                                        <button onClick={() => setDeleteAttConfirmId(null)} className="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-bold hover:bg-gray-300">Batal</button>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setDeleteAttConfirmId(att.id)} className="w-full text-red-600 hover:text-red-700 hover:bg-red-50 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2"><IconTrash2 size={18} /> Padam Rekod</button>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        )}

                        {tab === 'tetapan' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
                                <div>
                                    <h2 className="font-bold text-gray-800 text-lg flex items-center gap-2 mb-2"><IconMapPin className="text-blue-600" size={20}/> Geofence 150m</h2>
                                    <p className="text-sm text-gray-500 mb-4">Pekerja mesti berada dalam jarak 150 meter dari titik ini untuk merekod kehadiran.</p>
                                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm text-blue-800 font-medium mb-4 flex justify-between items-center">
                                        <div><span className="block text-xs text-blue-500 uppercase tracking-wider">Koordinat Kedai</span>Lat: {storeLocation.lat}<br/>Lng: {storeLocation.lng}</div>
                                        <IconMapPin size={32} className="text-blue-200" />
                                    </div>
                                    <button onClick={setLocationToCurrent} className="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-700 active:scale-95 transition-all">Kemaskini Ke Lokasi GPS Saya</button>
                                </div>
                                <hr className="border-gray-100" />
                                <div className="flex items-center justify-between bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <div>
                                        <h3 className="font-bold text-gray-800">Bypass Sistem GPS</h3>
                                        <p className="text-xs text-gray-500 mt-1">Hanya aktifkan untuk tujuan ujian.</p>
                                    </div>
                                    <label className="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" className="sr-only peer" checked={bypassGps} onChange={(e) => setBypassGps(e.target.checked)} />
                                        <div className="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600"></div>
                                    </label>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // PORTAL PEKERJA
        // ==========================================
        function EmployeeDashboard({ currentUser, setCurrentUser, leaves, attendances, verifyLocationAndExecute, modalMsg, setModalMsg, getToday, getCurrentTime, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [leaveType, setLeaveType] = useState('Cuti Bergaji');
            const [leaveDate, setLeaveDate] = useState(getToday());
            const [leaveReason, setLeaveReason] = useState('');

            const today = getToday();
            const isOnLeaveToday = leaves.some(l => l.userId === currentUser.id && l.date === today && l.status === 'Lulus');
            const todayRecord = attendances.find(a => a.userId === currentUser.id && a.date === today) || { clockIn: null, breakOut: null, breakIn: null, clockOut: null, otIn: null, otOut: null };

            const submitLeave = async (e) => {
                e.preventDefault();
                if(!leaveReason) return alert('Sila masukkan sebab cuti.'); 
                try {
                    await db.collection('leaves').add({ userId: currentUser.id, type: leaveType, date: leaveDate, reason: leaveReason, status: 'Pending', timestamp: Date.now() });
                    setLeaveReason(''); alert('Permohonan cuti berjaya dihantar.'); setTab('rekod_cuti');
                } catch (error) { alert("Ralat menghantar cuti: " + error.message); }
            };

            const recordTime = async (field) => {
                const timeNow = getCurrentTime();
                try {
                    if (todayRecord.id) {
                        await db.collection('attendances').doc(todayRecord.id).update({ [field]: timeNow });
                    } else {
                        await db.collection('attendances').add({ userId: currentUser.id, date: today, clockIn: null, breakOut: null, breakIn: null, clockOut: null, otIn: null, otOut: null, [field]: timeNow });
                    }
                    setModalMsg({ type: 'success', text: `Berjaya direkod: ${timeNow}` });
                    setTimeout(() => setModalMsg(null), 3000);
                } catch (error) { setModalMsg({ type: 'error', text: 'Ralat: ' + error.message }); }
            };

            const handleAction = (field, actionName) => verifyLocationAndExecute(actionName, () => recordTime(field));

            return (
                <div className="min-h-screen bg-gray-50 pb-20 relative">
                    <div className="bg-green-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <BrandLogo size="small" />
                            <div>
                                <h1 className="font-bold text-lg leading-tight truncate w-40">{currentUser.name}</h1>
                                <p className="text-xs text-green-100">Portal Pekerja</p>
                            </div>
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-green-700 rounded-full hover:bg-green-800 transition-colors">
                            <IconLogOut size={18} />
                        </button>
                    </div>

                    {modalMsg && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                {modalMsg.type === 'error' && <IconAlertTriangle className="mx-auto text-red-500 mb-4" size={56} />}
                                {modalMsg.type === 'success' && <IconCheckCircle className="mx-auto text-green-500 mb-4" size={56} />}
                                {modalMsg.type === 'info' && <IconMapPin className="mx-auto text-blue-500 mb-4 animate-bounce" size={56} />}
                                <p className="text-gray-800 font-bold text-lg mb-6 leading-snug">{modalMsg.text}</p>
                                {modalMsg.type !== 'info' && <button onClick={() => setModalMsg(null)} className="w-full bg-gray-900 text-white py-3.5 rounded-xl font-bold active:scale-95 shadow-md">Tutup Mesej</button>}
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-md mx-auto space-y-6 mt-2">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                            <button onClick={() => setTab('kehadiran')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'kehadiran' ? 'bg-green-50 text-green-600 border-b-2 border-green-600' : 'text-gray-500 hover:bg-gray-50'}`}>Kedatangan</button>
                            <button onClick={() => setTab('mohon_cuti')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'mohon_cuti' ? 'bg-green-50 text-green-600 border-b-2 border-green-600' : 'text-gray-500 hover:bg-gray-50'}`}>Mohon Cuti</button>
                            <button onClick={() => setTab('rekod_cuti')} className={`flex-1 py-3 text-sm font-bold transition-colors ${tab === 'rekod_cuti' ? 'bg-green-50 text-green-600 border-b-2 border-green-600' : 'text-gray-500 hover:bg-gray-50'}`}>Sejarah</button>
                        </div>

                        {tab === 'kehadiran' && (
                            <div className="space-y-5">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-400 to-blue-500"></div>
                                    <p className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-1">Tarikh Semasa</p>
                                    <h2 className="text-2xl font-black text-gray-800">{new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long' })}</h2>
                                </div>

                                {isOnLeaveToday ? (
                                    <div className="bg-orange-50 border border-orange-200 p-8 rounded-3xl text-center shadow-sm">
                                        <IconCalendar className="mx-auto text-orange-500 mb-4" size={56} />
                                        <h3 className="text-xl font-black text-orange-800 mb-2">Anda Sedang Bercuti</h3>
                                        <p className="text-orange-700 text-sm font-medium leading-relaxed">Kehadiran dikunci pada hari cuti.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <button disabled={todayRecord.clockIn} onClick={() => handleAction('clockIn', 'Clock In')} className={`p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all ${todayRecord.clockIn ? 'bg-gray-100 text-gray-400' : 'bg-green-500 text-white shadow-lg shadow-green-200 hover:bg-green-600 active:scale-95'}`}><IconClock size={32} /><span className="font-black tracking-wide">CLOCK IN</span>{todayRecord.clockIn && <span className="text-xs font-bold bg-white/20 px-2 py-1 rounded-md">{todayRecord.clockIn}</span>}</button>
                                            <button disabled={!todayRecord.clockIn || todayRecord.clockOut} onClick={() => handleAction('clockOut', 'Clock Out')} className={`p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all ${(!todayRecord.clockIn || todayRecord.clockOut) ? 'bg-gray-100 text-gray-400' : 'bg-red-500 text-white shadow-lg shadow-red-200 hover:bg-red-600 active:scale-95'}`}><IconLogOut size={32} /><span className="font-black tracking-wide">CLOCK OUT</span>{todayRecord.clockOut && <span className="text-xs font-bold bg-white/20 px-2 py-1 rounded-md">{todayRecord.clockOut}</span>}</button>
                                            <button disabled={!todayRecord.clockIn || todayRecord.breakOut} onClick={() => handleAction('breakOut', 'Keluar Rehat')} className={`p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all ${(!todayRecord.clockIn || todayRecord.breakOut) ? 'bg-gray-100 text-gray-400' : 'bg-yellow-500 text-white shadow-lg shadow-yellow-200 hover:bg-yellow-600 active:scale-95'}`}><IconPlay size={32} className="rotate-90"/><span className="font-bold">Keluar Rehat</span>{todayRecord.breakOut && <span className="text-xs font-bold bg-white/20 px-2 py-1 rounded-md">{todayRecord.breakOut}</span>}</button>
                                            <button disabled={!todayRecord.breakOut || todayRecord.breakIn} onClick={() => handleAction('breakIn', 'Masuk Rehat')} className={`p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all ${(!todayRecord.breakOut || todayRecord.breakIn) ? 'bg-gray-100 text-gray-400' : 'bg-blue-500 text-white shadow-lg shadow-blue-200 hover:bg-blue-600 active:scale-95'}`}><IconPlay size={32} className="-rotate-90"/><span className="font-bold">Masuk Rehat</span>{todayRecord.breakIn && <span className="text-xs font-bold bg-white/20 px-2 py-1 rounded-md">{todayRecord.breakIn}</span>}</button>
                                        </div>
                                        <div className="bg-purple-50 p-4 rounded-2xl border border-purple-100">
                                            <h3 className="text-sm font-black text-purple-800 mb-3 flex items-center gap-2"><IconClock size={16}/> KERJA LEBIH MASA (OT)</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button disabled={todayRecord.otIn} onClick={() => handleAction('otIn', 'OT Masuk')} className={`p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition-all ${todayRecord.otIn ? 'bg-white text-gray-400 border border-gray-200' : 'bg-purple-600 text-white shadow-md hover:bg-purple-700 active:scale-95'}`}><span className="font-bold text-sm">OT Masuk</span>{todayRecord.otIn && <span className="text-xs">{todayRecord.otIn}</span>}</button>
                                                <button disabled={!todayRecord.otIn || todayRecord.otOut} onClick={() => handleAction('otOut', 'OT Keluar')} className={`p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition-all ${(!todayRecord.otIn || todayRecord.otOut) ? 'bg-white text-gray-400 border border-gray-200' : 'bg-purple-800 text-white shadow-md hover:bg-purple-900 active:scale-95'}`}><span className="font-bold text-sm">OT Keluar</span>{todayRecord.otOut && <span className="text-xs">{todayRecord.otOut}</span>}</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'mohon_cuti' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="font-black text-gray-800 mb-5 text-xl">Borang Cuti</h2>
                                <form onSubmit={submitLeave} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Jenis Cuti</label>
                                        <select value={leaveType} onChange={(e) => setLeaveType(e.target.value)} className="w-full border-2 border-gray-200 rounded-xl p-3 focus:ring-0 focus:border-green-500 outline-none font-medium bg-gray-50">
                                            <option>Cuti Bergaji</option><option>Cuti Tanpa Gaji</option><option>Cuti Sakit (MC)</option><option>Cuti Kecemasan</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Tarikh Cuti</label>
                                        <input type="date" value={leaveDate} min={getToday()} onChange={(e) => setLeaveDate(e.target.value)} className="w-full border-2 border-gray-200 rounded-xl p-3 focus:ring-0 focus:border-green-500 outline-none font-medium bg-gray-50" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Sebab Penuh</label>
                                        <textarea value={leaveReason} onChange={(e) => setLeaveReason(e.target.value)} placeholder="Sila nyatakan sebab..." className="w-full border-2 border-gray-200 rounded-xl p-3 focus:ring-0 focus:border-green-500 outline-none h-28 resize-none font-medium bg-gray-50" required></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-green-600 text-white font-black py-4 rounded-xl hover:bg-green-700 transition-colors shadow-lg active:scale-95">Hantar Ke Admin</button>
                                </form>
                            </div>
                        )}

                        {tab === 'rekod_cuti' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-gray-700 mb-2">Sejarah Cuti</h2>
                                {leaves.filter(l => l.userId === currentUser.id).length === 0 ? <p className="text-gray-500 text-center py-8 bg-white rounded-xl border border-dashed font-medium">Tiada permohonan cuti direkodkan.</p> :
                                leaves.filter(l => l.userId === currentUser.id).reverse().map((leave, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <h3 className="font-black text-gray-800">{leave.type}</h3>
                                                <p className="text-sm font-medium text-gray-500">{leave.date}</p>
                                            </div>
                                            <span className={`px-3 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest ${leave.status === 'Lulus' ? 'bg-green-100 text-green-700' : leave.status === 'Ditolak' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>{leave.status}</span>
                                        </div>
                                        <p className="text-sm text-gray-600 font-medium bg-gray-50 p-3 rounded-xl border border-gray-100"><span className="font-bold text-gray-800">Sebab:</span> {leave.reason}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
