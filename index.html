<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Kehadiran MBE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
            .print-table th { background-color: #f3f4f6; }

    </style>
</head>
<body class="bg-gray-100 antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IKON ---
        const IconUser = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconUserPlus = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="16" x2="22" y1="11" y2="11"/></svg>;
        const IconClock = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconCalendar = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconCheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconXCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
        const IconTrash2 = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconLogOut = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconChartBar = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
        const IconSettings = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconMap = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>;
        const IconPrinter = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconClipboardCheck = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>;
        const IconDownload = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

        // --- CUTI UMUM 2026 ---
        const publicHolidays2026 = [
            { id: 1, dateStr: '17 Januari (Sabtu)', event: 'Israk Mikraj' },
            { id: 2, dateStr: '17 Feb (Selasa)', event: 'Tahun Baru Cina' },
            { id: 3, dateStr: '7 Mac (Sabtu)', event: 'Nuzul Quran' },
            { id: 4, dateStr: '21 Mac (Sabtu)', event: 'Hari Raya Aidilfitri' },
            { id: 5, dateStr: '22 Mac (Ahad)', event: 'Hari Raya Aidilfitri' },
            { id: 6, dateStr: '26 April (Ahad)', event: 'Hari Keputeraan DYMM Sultan Terengganu' },
            { id: 7, dateStr: '27 Mei (Rabu)', event: 'Hari Raya Haji' },
            { id: 8, dateStr: '28 Mei (Khamis)', event: 'Hari Raya Haji' },
            { id: 9, dateStr: '1 Jun (Isnin)', event: 'Hari Keputeraan Agong' },
            { id: 10, dateStr: '17 Jun (Rabu)', event: 'Awal Muharram' },
            { id: 11, dateStr: '31 Ogos (Isnin)', event: 'Hari Kemerdekaan' },
            { id: 12, dateStr: '16 September (Rabu)', event: 'Hari Malaysia' },
        ];

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA20Va8z_pTNvo1d6v3T0GZSJz7nSMTTiU",
            authDomain: "kehadiran-web.firebaseapp.com",
            projectId: "kehadiran-web",
            storageBucket: "kehadiran-web.firebasestorage.app",
            messagingSenderId: "57438014766",
            appId: "1:57438014766:web:63730481e6d649a9393ebf"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Senarai Pekerja Asal
        const originalWorkers = [
            { id: 'MZBE072022', name: 'NUR MAISARAH BINTI AHMAD RIZAL', password: 'MZBE072022', role: 'pekerja' },
            { id: 'MZBE082022', name: 'WAN ADIB ASHRAF BIN AB WAHAB', password: 'MZBE082022', role: 'pekerja' },
            { id: 'MZBE092022', name: 'AMMAR ZAKWAN BIN DAUD', password: 'MZBE092022', role: 'pekerja' },
            { id: 'MZBE102022', name: 'ATHIRAH BINTI MOHD ZEIN', password: 'MZBE102022', role: 'pekerja' },
            { id: 'MZBE012024', name: 'AHMAD BUKHARIE BIN FAIZAL NORHADI', password: 'MZBE012024', role: 'pekerja' },
            { id: 'MZBE022024', name: 'NURLAILI BINTI ZAHARI', password: 'MZBE022024', role: 'pekerja' },
            { id: 'MZBE022025', name: 'ABDUL RAHMAN BIN S. HAMID', password: 'MZBE022025', role: 'pekerja' },
            { id: 'MZBE032025', name: 'MUHAMMAD AIMAN BIN MOHD ZULKIFLI', password: 'MZBE032025', role: 'pekerja' },
            { id: 'MZBE042025', name: 'FATIN AMIERA BINTI RAZIHA', password: 'MZBE042025', role: 'pekerja' }
        ];

        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [usernameInput, setUsernameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const [systemSettings, setSystemSettings] = useState({ 
                clockOutTime: '17:00', storeLat: 5.769745133537923, storeLng: 102.56141454050919, bypassGps: false 
            });
            
            const [leaves, setLeaves] = useState([]);
            const [attendances, setAttendances] = useState([]);
            const [dbUsers, setDbUsers] = useState([]);

            const staticAdmins = [
                { id: 'ADMIN', password: 'tatlim82', name: 'SUPER ADMIN MBE', role: 'admin' },
                { id: 'MZBEBOSS001', password: 'admin', name: 'MUIZZUDDIN BIN AB.LLAH', role: 'admin' }
            ];

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error(e));
                const unsubscribe = auth.onAuthStateChanged(u => setFirebaseUser(u));
                return () => unsubscribe();
            }, []);

            const syncOriginalWorkers = async (currentDbUsers) => {
                if (currentDbUsers.length === 0) {
                    for (const worker of originalWorkers) {
                        await db.collection('users').doc(worker.id).set(worker);
                    }
                }
            };

            useEffect(() => {
                if (!firebaseUser) return;
                const unsubSettings = db.collection('settings').doc('config').onSnapshot(doc => {
                    if(doc.exists) setSystemSettings(prev => ({ ...prev, ...doc.data() }));
                });
                const unsubLeaves = db.collection('leaves').onSnapshot(s => setLeaves(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubAtt = db.collection('attendances').onSnapshot(s => {
                    setAttendances(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsDbReady(true);
                });
                const unsubUsers = db.collection('users').onSnapshot(s => {
                    const fetchedUsers = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setDbUsers(fetchedUsers);
                    syncOriginalWorkers(fetchedUsers);
                });
                return () => { unsubSettings(); unsubLeaves(); unsubAtt(); unsubUsers(); };
            }, [firebaseUser]);

            const handleLogin = (e) => {
                e.preventDefault();
                const cleanUser = usernameInput.trim().toUpperCase();
                const cleanPass = passwordInput.trim();
                let user = staticAdmins.find(u => u.id === cleanUser && u.password === cleanPass);
                if (!user) user = dbUsers.find(u => u.id === cleanUser && u.password === cleanPass);
                if (user) { setCurrentUser(user); setUsernameInput(''); setPasswordInput(''); setLoginError(''); }
                else setLoginError('ID Pengguna atau Kata Laluan salah.');
            };

            const BrandLogo = ({ size = "large" }) => (
                <div className={`flex flex-col items-center justify-center ${size === 'large' ? 'mb-8' : 'mb-0 shrink-0'}`}>
                    <img src="./logo.png" alt="MBE" style={{ height: size === 'large' ? '120px' : '42px', width: 'auto', objectFit: 'contain' }} className={size === 'large' ? 'mb-3' : 'bg-white rounded p-1'} onError={e => { e.target.onerror=null; e.target.src="https://placehold.co/100x100/2563eb/ffffff?text=MBE"; }} />
                    {size === 'large' && <div className="text-center"><h1 className="text-2xl font-black text-gray-800 tracking-tight uppercase">Muiz Banner</h1><p className="text-sm font-bold text-gray-500 uppercase tracking-widest">Empire</p></div>}
                </div>
            );

            if (!currentUser) return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
                        <BrandLogo size="large" />
                        <form onSubmit={handleLogin} className="space-y-5">
                            {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm text-center border border-red-200 font-bold uppercase">{loginError}</div>}
                            <div><label className="block text-sm font-bold text-gray-700 mb-1 tracking-wide uppercase">ID Pengguna</label><input type="text" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 outline-none focus:border-blue-500 uppercase transition-all" required /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1 tracking-wide uppercase">Kata Laluan</label><input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 outline-none focus:border-blue-500 transition-all" required /></div>
                            <button type="submit" className="w-full py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 uppercase tracking-widest">{isDbReady ? 'Log Masuk Sistem' : 'Menyambung...'}</button>
                        </form>
                    </div>
                </div>
            );

            return currentUser.role === 'admin' ? 
                <AdminDashboard currentUser={currentUser} setCurrentUser={setCurrentUser} leaves={leaves} attendances={attendances} dbUsers={dbUsers} staticAdmins={staticAdmins} systemSettings={systemSettings} BrandLogo={BrandLogo} /> :
                <EmployeeDashboard currentUser={currentUser} setCurrentUser={setCurrentUser} leaves={leaves} attendances={attendances} systemSettings={systemSettings} BrandLogo={BrandLogo} />;
        }

        // ==========================================
        // PANEL ADMIN
        // ==========================================
        function AdminDashboard({ currentUser, setCurrentUser, leaves, attendances, dbUsers, staticAdmins, systemSettings, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [analisaPeriod, setAnalisaPeriod] = useState('Bulan Ini');
            const [analisaUser, setAnalisaUser] = useState('ALL');
            const [newStaf, setNewStaf] = useState({ name: '', id: '', password: '' });
            const [gpsLogs, setGpsLogs] = useState([]);

            const allPekerja = [...dbUsers, ...staticAdmins].filter(u => u.role === 'pekerja' || u.id === 'MZBEBOSS001');

            useEffect(() => {
                const unsub = db.collection('failed_gps_logs').onSnapshot(s => {
                    const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setGpsLogs(data.slice(0, 30)); // Limit to last 30 logs
                });
                return () => unsub();
            }, []);

            const handleDecision = async (id, status) => {
                try { await db.collection('attendances').doc(id).update({ penaltyStatus: status }); } catch (e) { alert(e.message); }
            };

            const isDateInPeriod = (dateStr) => {
                if (!dateStr) return false;
                const d = new Date(dateStr);
                const now = new Date();
                if (analisaPeriod === 'Minggu Ini') {
                    const monday = new Date(now); monday.setDate(now.getDate() - (now.getDay() || 7) + 1);
                    monday.setHours(0,0,0,0); return d >= monday;
                }
                if (analisaPeriod === 'Bulan Ini') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (analisaPeriod === 'Tahun Ini') return d.getFullYear() === now.getFullYear();
                return true;
            };

            const getAnalisaData = (uid) => {
                const userAtt = attendances.filter(a => (uid === 'ALL' || a.userId === uid) && isDateInPeriod(a.date));
                const userLeaves = leaves.filter(l => (uid === 'ALL' || l.userId === uid) && l.status === 'Lulus' && isDateInPeriod(l.date));
                
                let penaltyRM5 = 0; let penaltyRM10 = 0; let halfPay = 0; let absentDues = 0; let totalLate = 0;

                userAtt.forEach(a => {
                    if (a.penaltyType && a.penaltyStatus !== 'Dikecualikan') {
                        totalLate++;
                        if (a.penaltyValue === 5) penaltyRM5++;
                        if (a.penaltyValue === 10) penaltyRM10++;
                        if (a.penaltyType === 'HalfPay') halfPay++;
                        if (a.penaltyType === 'Absent') absentDues++;
                    }
                });

                return { hadir: userAtt.length, lambat: totalLate, dendaWang: (penaltyRM5 * 5) + (penaltyRM10 * 10), separuhGaji: halfPay, tidakHadir: absentDues };
            };

            const summary = getAnalisaData(analisaUser);
            const pendingPenaltiesCount = attendances.filter(a => a.penaltyType && a.penaltyStatus === 'Pending').length;

            const downloadCSV = () => {
                let csv = "\uFEFF";
                if (analisaUser === 'ALL') {
                    csv += "Nama Pekerja,Hadir,Lewat Dikenakan Denda,Denda Wang (RM),Potong Separuh Gaji,Tidak Hadir\n";
                    allPekerja.forEach(p => {
                        const d = getAnalisaData(p.id);
                        csv += `"${p.name}",${d.hadir},${d.lambat},${d.dendaWang},${d.separuhGaji},${d.tidakHadir}\n`;
                    });
                } else {
                    const selUser = allPekerja.find(p=>p.id === analisaUser)?.name || '';
                    csv += `Laporan Terperinci: ${selUser} (${analisaPeriod})\n\n`;
                    csv += "Tarikh,Masuk,Keluar,Status Denda,Sebab Lewat/Awal,Potongan Dikenakan\n";
                    attendances.filter(a => a.userId === analisaUser && isDateInPeriod(a.date)).forEach(a => {
                        const isExcused = a.penaltyStatus === 'Dikecualikan';
                        const isPending = a.penaltyStatus === 'Pending';
                        const status = a.penaltyType ? (isExcused ? 'DIKECUALIKAN' : isPending ? 'PENDING PENGESAHAN' : 'DIKENAKAN') : 'NORMAL';
                        const amt = (a.penaltyType && !isExcused) ? (a.penaltyType==='HalfPay' ? '50% Gaji' : a.penaltyType==='Absent' ? 'Tidak Hadir' : a.penaltyType==='EarlyLeave' ? 'Balik Awal' : `RM${a.penaltyValue}`) : '-';
                        const reason = a.lateReason || a.earlyLeaveReason || '-';
                        csv += `${a.date},${a.clockIn || '-'},${a.clockOut || '-'},${status},"${reason}",${amt}\n`;
                    });
                }
                const link = document.createElement("a");
                link.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
                link.download = `Laporan_Kehadiran_${analisaPeriod.replace(' ', '_')}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20 text-sm">
                    <div className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center no-print">
                        <div className="flex items-center gap-3"><BrandLogo size="small" /><div><h1 className="font-bold uppercase tracking-tight">Panel Admin</h1><p className="text-[10px] opacity-80 uppercase font-black">{currentUser.name}</p></div></div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-blue-700 rounded-full hover:bg-blue-800"><IconLogOut size={18} /></button>
                    </div>

                    <div className="p-4 max-w-5xl mx-auto space-y-6">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-x-auto hide-scroll border border-gray-100 no-print">
                            {['kehadiran', 'pengesahan', 'analisa', 'staf', 'umum', 'tetapan'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`flex-none px-6 py-4 text-[11px] font-black uppercase tracking-widest transition-all ${tab === t ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-gray-400'}`}>
                                    {t === 'pengesahan' && pendingPenaltiesCount > 0 && "🔴 "}{t}
                                </button>
                            ))}
                        </div>

                        {/* TAB: PENGESAHAN DENDA */}
                        {tab === 'pengesahan' && (
                            <div className="space-y-4 no-print">
                                <h2 className="font-black text-gray-700 uppercase tracking-widest text-sm flex items-center gap-2"><IconClipboardCheck size={18} className="text-orange-500"/> Pengesahan Denda</h2>
                                {attendances.filter(a => a.penaltyType && a.penaltyStatus === 'Pending').length === 0 ? (
                                    <div className="bg-white p-10 rounded-3xl border-2 border-dashed border-gray-200 text-center text-gray-400 font-bold uppercase text-xs tracking-widest">Tiada pengesahan diperlukan.</div>
                                ) : (
                                    attendances.filter(a => a.penaltyType && a.penaltyStatus === 'Pending').reverse().map((att, i) => {
                                        const u = allPekerja.find(x => x.id === att.userId);
                                        return (
                                            <div key={i} className="bg-white p-6 rounded-3xl shadow-sm border-2 border-orange-200">
                                                <div className="flex justify-between items-start mb-3">

        // ==========================================
        // PORTAL PEKERJA
        // ==========================================
        function EmployeeDashboard({ currentUser, setCurrentUser, leaves, attendances, systemSettings, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [reasonModal, setReasonModal] = useState({ show: false, type: '', action: '', penaltyType: null, penaltyValue: null });
            const [inputReason, setInputReason] = useState('');
            const [modalMsg, setModalMsg] = useState(null);
            const [currentDist, setCurrentDist] = useState(null);
            
            const today = new Date().toLocaleDateString('en-CA');
            const att = attendances.find(a => a.userId === currentUser.id && a.date === today) || { clockIn: null, clockOut: null };

            const recordNormal = async (field) => {
                const time = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true });
                try {
                    if (att.id) await db.collection('attendances').doc(att.id).update({ [field]: time });
                    else await db.collection('attendances').add({ userId: currentUser.id, date: today, [field]: time, clockIn: field==='clockIn'?time:null, clockOut:null, breakOut:null, breakIn:null, otIn:null, otOut:null });
                    setModalMsg({ type: 'success', text: `Berjaya direkod: ${time}` });
                    setTimeout(() => setModalMsg(null), 3000);
                } catch (e) { setModalMsg({ type: 'error', text: e.message }); }
            };

            const processTimeCheckAndExecute = (action) => {
                const now = new Date();
                const mins = now.getHours() * 60 + now.getMinutes();

                if (action === 'clockIn') {
                    if (mins >= 660) { setReasonModal({ show: true, type: 'Masuk Lewat (Melebihi 11 Pagi)', action: 'clockIn', penaltyType: 'Absent', penaltyValue: 'Absent' }); }
                    else if (mins >= 540) { setReasonModal({ show: true, type: 'Masuk Lewat (Potongan 50%)', action: 'clockIn', penaltyType: 'HalfPay', penaltyValue: 'HalfPay' }); }
                    else if (mins >= 525) { setReasonModal({ show: true, type: 'Masuk Lewat (Denda RM10)', action: 'clockIn', penaltyType: 'DendaRM10', penaltyValue: 10 }); }
                    else if (mins > 495) { setReasonModal({ show: true, type: 'Masuk Lewat (Denda RM5)', action: 'clockIn', penaltyType: 'DendaRM5', penaltyValue: 5 }); }
                    else { recordNormal('clockIn'); }
                } 
                else if (action === 'clockOut') {
                    const limit = systemSettings.clockOutTime === '17:00' ? 1020 : 990;
                    if (mins < limit) { setReasonModal({ show: true, type: 'Balik Awal', action: 'clockOut', penaltyType: 'EarlyLeave', penaltyValue: 0 }); }
                    else { recordNormal('clockOut'); }
                }
                else {
                    recordNormal(action);
                }
            };

            const verifyLocationStrict = (actionName, onSuccess) => {
                if (systemSettings.bypassGps === true) {
                    onSuccess();
                    return;
                }

                setModalMsg({ type: 'info', text: 'Sistem sedang mendapatkan dan mengesahkan ketepatan lokasi satelit anda...\n\nSila tunggu sebentar.' });
                
                if (!navigator.geolocation) {
                    setModalMsg({ type: 'error', text: 'Sistem GPS tidak disokong pada peranti atau pelayar internet anda.' });
                    return;
                }

                navigator.geolocation.getCurrentPosition(async (p) => {
                    const lat = parseFloat(p.coords.latitude);
                    const lng = parseFloat(p.coords.longitude);
                    const accuracy = parseFloat(p.coords.accuracy);

                    // Tolak jika ketepatan terlampau lemah (> 150 meter error margin)
                    if (accuracy > 150) {
                        setModalMsg({ type: 'error', text: `RALAT KETEPATAN GPS: Isyarat GPS telefon anda terlalu lemah (Ralat ±${Math.round(accuracy)} meter).\n\nSistem mengesyaki anda menggunakan lokasi Rangkaian (Telco) yang tidak tepat.\n\nSila berjalan ke luar bangunan, atau matikan/hidupkan semula 'Location' di telefon anda untuk mendapatkan isyarat satelit yang tepat.` });
                        return;
                    }

                    const R = 6371e3;
                    const storeLat = parseFloat(systemSettings.storeLat) || 5.769745133537923;
                    const storeLng = parseFloat(systemSettings.storeLng) || 102.56141454050919;
                    const p1 = lat * Math.PI/180;
                    const p2 = storeLat * Math.PI/180;
                    const dp = (storeLat - lat) * Math.PI/180;
                    const dl = (storeLng - lng) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));

                    if (dist > 70 || isNaN(dist)) {
                        try {
                            await db.collection('failed_gps_logs').add({
                                userId: currentUser.id,
                                action: actionName,
                                date: today,
                                time: new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true }),
                                lat: lat,
                                lng: lng,
                                distance: isNaN(dist) ? 0 : Math.round(dist),
                                accuracy: Math.round(accuracy),
                                timestamp: Date.now()
                            });
                        } catch(e) { console.error(e); }

                        setModalMsg({
                            type: 'error',
                            text: `TIDAK SAH! ANDA DI LUAR KAWASAN.\n\nJarak Semasa: ${isNaN(dist) ? 'Tidak Diketahui' : Math.round(dist)} meter dari kedai.\nHad radius kebenaran ialah 70m sahaja.\n\nPercubaan ini telah direkodkan ke dalam Sistem Admin.`
                        });
                    } else {
                        setModalMsg(null);
                        onSuccess();
                    }
                }, (err) => {
                    let errorMsg = `Sistem GPS Gagal (${err.message}).`;
                    if (err.code === 1) errorMsg += "\nSila pastikan anda menekan 'Allow' (Benarkan) apabila browser meminta akses lokasi.";
                    if (err.code === 2) errorMsg += "\nPosisi GPS tidak dapat dibaca oleh peranti anda.";
                    if (err.code === 3) errorMsg += "\nTimeout: Sila pastikan 'Location' anda menyala.";
                    setModalMsg({ type: 'error', text: errorMsg });
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
            };

            const handleActionClick = (action) => {
                if (currentUser.id === 'MZBEBOSS001' || currentUser.id === 'ADMIN') {
                    processTimeCheckAndExecute(action);
                    return;
                }
                
                // Semakan ketat sebelum buka modal (atau sebelum rekod)
                verifyLocationStrict(action, () => processTimeCheckAndExecute(action));
            };

            const submitReasonAndRecord = async (e) => {
                e.preventDefault();
                
                // SEMAKAN SEKALI LAGI SEBELUM REKOD!
                // Ini menghalang kelompangan (loophole) di mana pekerja bawa balik telefon dengan modal terpasang dan klik 'Submit' di rumah.
                verifyLocationStrict(reasonModal.action, async () => {
                    const time = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true });
                    let dataToUpdate = { [reasonModal.action]: time };
                    
                    if (reasonModal.action === 'clockIn') {
                        dataToUpdate.lateReason = inputReason;
                        dataToUpdate.penaltyType = reasonModal.penaltyType;
                        dataToUpdate.penaltyValue = reasonModal.penaltyValue;
                        dataToUpdate.penaltyStatus = 'Pending';
                    } else if (reasonModal.action === 'clockOut') {
                        dataToUpdate.earlyLeaveReason = inputReason;
                        dataToUpdate.penaltyType = reasonModal.penaltyType;
                        dataToUpdate.penaltyStatus = 'Pending';
                    }

                    try {
                        if (att.id) await db.collection('attendances').doc(att.id).update(dataToUpdate);
                        else await db.collection('attendances').add({ userId: currentUser.id, date: today, ...dataToUpdate, clockIn: reasonModal.action==='clockIn'?time:null, clockOut:null, breakOut:null, breakIn:null, otIn:null, otOut:null });
                        
                        setReasonModal({show:false}); 
                        setInputReason(''); 
                        setModalMsg({ type: 'success', text: `Kehadiran telah berjaya direkodkan pada ${time}.` });
                        setTimeout(() => setModalMsg(null), 4000);
                    } catch (err) { setModalMsg({ type: 'error', text: err.message }); }
                });
            };

            const checkMyDistance = () => {
                setModalMsg({ type: 'info', text: 'Menyemak jarak semasa anda...' });
                navigator.geolocation.getCurrentPosition((p) => {
                    const lat = parseFloat(p.coords.latitude);
                    const lng = parseFloat(p.coords.longitude);
                    const accuracy = parseFloat(p.coords.accuracy);
                    const R = 6371e3;
                    const storeLat = parseFloat(systemSettings.storeLat) || 5.769745133537923;
                    const storeLng = parseFloat(systemSettings.storeLng) || 102.56141454050919;
                    const p1 = lat * Math.PI/180;
                    const p2 = storeLat * Math.PI/180;
                    const dp = (storeLat - lat) * Math.PI/180;
                    const dl = (storeLng - lng) * Math.PI/180;
                    const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                    const dist = Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
                    
                    setCurrentDist(dist);
                    if(dist <= 70) {
                        setModalMsg({ type: 'success', text: `Kedudukan Anda Tepat!\n\nJarak dari kedai: ${dist} meter.\nKetepatan isyarat GPS: ±${Math.round(accuracy)} meter.\n\nAnda dibenarkan untuk membuat transaksi kehadiran.` });
                    } else {
                        setModalMsg({ type: 'error', text: `Luar Kawasan!\n\nJarak anda ialah ${dist} meter.\nKetepatan isyarat GPS: ±${Math.round(accuracy)} meter.\n\nSila masuk ke dalam lingkungan radius 70m.` });
                    }
                }, (err) => {
                    let errorMsg = `Ralat GPS: ${err.message}`;
                    if (err.code === 1) errorMsg += "\nSila beri kebenaran 'Allow' lokasi pada pelayar internet anda.";
                    setModalMsg({ type: 'error', text: errorMsg});
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20 relative text-sm">
                    <div className="bg-green-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-3"><BrandLogo size="small" /><div><h1 className="font-bold text-sm truncate w-40 uppercase">{currentUser.name}</h1><p className="text-[10px] opacity-80 uppercase font-black leading-none tracking-widest">Portal Pekerja</p></div></div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-green-700 rounded-full"><IconLogOut size={16} /></button>
                    </div>

                    {modalMsg && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-in zoom-in border-2 border-gray-100">
                                {modalMsg.type==='error'&&<IconXCircle className="mx-auto text-red-500 mb-4" size={56}/>}
                                {modalMsg.type==='success'&&<IconCheckCircle className="mx-auto text-green-500 mb-4" size={56}/>}
                                {modalMsg.type==='info'&&<IconMap className="mx-auto text-blue-500 mb-4 animate-bounce" size={56}/>}
                                <p className="font-bold text-sm mb-6 leading-relaxed whitespace-pre-line">{modalMsg.text}</p>
                                {modalMsg.type !== 'info' && <button onClick={()=>setModalMsg(null)} className="w-full bg-gray-900 text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all shadow-md">Tutup</button>}
                            </div>
                        </div>
                    )}

                    {reasonModal.show && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-7 w-full max-w-sm shadow-2xl border-4 border-orange-500 uppercase">
                                <h2 className="text-xl font-black text-gray-800 tracking-tight">{reasonModal.type}</h2>
                                <div className="mt-3 p-4 bg-orange-50 rounded-2xl border border-orange-100 text-orange-800 font-black text-[11px] leading-tight">
                                    {reasonModal.penaltyType === 'Absent' ? '🔴 ANDA HADIR SELEPAS 11 AM. STATUS DENDA: TIDAK HADIR.' : 
                                     reasonModal.penaltyType === 'HalfPay' ? '🟠 ANDA HADIR SELEPAS 9 AM. POTONGAN: SEPARUH GAJI.' : 
                                     reasonModal.penaltyType === 'DendaRM10' ? '🟡 ANDA HADIR SELEPAS 8:45 AM. DENDA RM10.' : 
                                     reasonModal.penaltyType === 'DendaRM5' ? '🟡 ANDA HADIR SELEPAS 8:15 AM. DENDA RM5.' : 'Anda merekodkan waktu balik sebelum waktu rasmi.'}
                                </div>
                                <p className="text-[10px] text-gray-500 mt-4 font-bold tracking-widest">SILA NYATAKAN SEBAB ANDA:</p>
                                <form onSubmit={submitReasonAndRecord} className="space-y-4 mt-3">
                                    <textarea value={inputReason} onChange={e => setInputReason(e.target.value)} className="w-full border-2 border-gray-100 p-4 rounded-2xl h-28 bg-gray-50 outline-none focus:border-orange-500 font-bold text-xs" required placeholder="Tuliskan sebab (wajib)..."></textarea>
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-orange-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-md transition-all active:scale-95">Teruskan Transaksi</button>
                                        <button type="button" onClick={()=>setReasonModal({show:false})} className="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95">Batal</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-md mx-auto space-y-6 mt-2">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-x-auto hide-scroll border border-gray-100">
                            {['kehadiran', 'mohon_cuti', 'rekod_cuti', 'umum'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`flex-none px-6 py-4 text-[10px] font-black uppercase tracking-widest transition-all ${tab===t?'bg-green-50 text-green-600 border-b-2 border-green-600':'text-gray-400'}`}>{t.replace('_',' ')}</button>
                            ))}
                        </div>

                        {tab === 'kehadiran' && (
                            <div className="space-y-6 uppercase">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1.5 bg-green-500"></div>
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 font-black">Status Kedai : {systemSettings.clockOutTime === '17:00' ? 'Balik 5:00 PM' : 'Balik 4:30 PM'}</p>
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight leading-none">{new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long' })}</h2>
                                    {systemSettings.bypassGps === true && (
                                        <div className="mt-3 inline-block bg-red-100 text-red-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest animate-pulse border border-red-200">⚠️ Bypass GPS Aktif</div>
                                    )}
                                </div>
                                
                                <button onClick={checkMyDistance} className="w-full bg-blue-50 text-blue-600 font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest border border-blue-100 hover:bg-blue-100 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-sm">
                                    <IconMap size={16}/> {currentDist !== null ? `Jarak Anda: ${currentDist} Meter` : 'Uji Jarak GPS Saya Ke Kedai'}
                                </button>
                                
                                {/* INFO KOTAK STATUS UNTUK PEKERJA */}
                                {att.penaltyType && (
                                    <div className={`p-4 rounded-2xl font-black text-[10px] tracking-widest flex flex-col gap-2 border-2 ${att.penaltyStatus === 'Dikecualikan' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                        <div className="flex justify-between items-center">
                                            <span>DENDA HARI INI: {att.penaltyType === 'Absent' ? 'TIDAK HADIR' : att.penaltyType === 'HalfPay' ? 'POTONG 50%' : att.penaltyType === 'EarlyLeave' ? 'BALIK AWAL' : `RM${att.penaltyValue}`}</span>
                                            <span className="bg-white px-2 py-1 rounded-lg text-[9px] shadow-sm">{att.penaltyStatus || 'PENDING'}</span>
                                        </div>
                                        {att.penaltyStatus === 'Pending' && <p className="text-[9px] text-gray-500 normal-case italic">* Menunggu pengesahan daripada pihak Admin.</p>}
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-4">
                                    <button disabled={att.clockIn} onClick={() => handleActionClick('clockIn')} className={`p-6 rounded-3xl flex flex-col items-center gap-3 transition-all shadow-lg ${att.clockIn ? 'bg-gray-50 text-gray-200' : 'bg-green-500 text-white active:scale-90 hover:bg-green-600'}`}><IconClock size={36}/><span className="font-black text-xs uppercase tracking-widest">Clock In</span>{att.clockIn && <span className="text-[11px] font-black bg-white/20 px-2 py-0.5 rounded-full">{att.clockIn}</span>}</button>
                                    <button disabled={!att.clockIn || att.clockOut} onClick={() => handleActionClick('clockOut')} className={`p-6 rounded-3xl flex flex-col items-center gap-3 transition-all shadow-lg ${(!att.clockIn || att.clockOut) ? 'bg-gray-50 text-gray-200' : 'bg-red-500 text-white active:scale-90 hover:bg-red-600'}`}><IconLogOut size={36}/><span className="font-black text-xs uppercase tracking-widest">Clock Out</span>{att.clockOut && <span className="text-[11px] font-black bg-white/20 px-2 py-0.5 rounded-full">{att.clockOut}</span>}</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4"><button disabled={!att.clockIn || att.breakOut} onClick={() => handleActionClick('breakOut')} className={`p-4 rounded-xl flex flex-col items-center transition-all ${(!att.clockIn || att.breakOut) ? 'bg-gray-100 text-gray-300' : 'bg-yellow-500 text-white shadow-md active:scale-95'}`}><span className="text-[9px] font-black uppercase tracking-widest">Keluar Rehat</span>{att.breakOut && <span className="text-[10px] font-black">{att.breakOut}</span>}</button><button disabled={!att.breakOut || att.breakIn} onClick={() => handleActionClick('breakIn')} className={`p-4 rounded-xl flex flex-col items-center transition-all ${(!att.breakOut || att.breakIn) ? 'bg-gray-100 text-gray-300' : 'bg-blue-500 text-white shadow-md active:scale-95'}`}><span className="text-[9px] font-black uppercase tracking-widest">Masuk Rehat</span>{att.breakIn && <span className="text-[10px] font-black">{att.breakIn}</span>}</button></div>
                                
                                <div className="bg-purple-50 p-4 rounded-3xl border border-purple-100 grid grid-cols-2 gap-3 mt-2">
                                    <button disabled={att.otIn} onClick={() => handleActionClick('otIn')} className={`p-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${att.otIn ? 'bg-white border-2 border-gray-100 text-gray-300' : 'bg-purple-600 text-white shadow-md active:scale-95'}`}>
                                        OT Masuk {att.otIn && <span className="block mt-1 text-[11px] font-black">{att.otIn}</span>}
                                    </button>
                                    <button disabled={!att.otIn || att.otOut} onClick={() => handleActionClick('otOut')} className={`p-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${(!att.otIn || att.otOut) ? 'bg-white border-2 border-gray-100 text-gray-300' : 'bg-purple-800 text-white shadow-md active:scale-95'}`}>
                                        OT Keluar {att.otOut && <span className="block mt-1 text-[11px] font-black">{att.otOut}</span>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'mohon_cuti' && (
                             <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 uppercase"><h2 className="font-black text-gray-800 mb-5 tracking-widest text-sm uppercase">Borang Cuti</h2><form onSubmit={async (e) => { e.preventDefault(); try { const f = e.target; await db.collection('leaves').add({ userId: currentUser.id, type: f.type.value, date: f.date.value, reason: f.reason.value, status: 'Pending', timestamp: Date.now() }); setModalMsg({type: 'success', text: "Permohonan berjaya dihantar!"}); setTab('rekod_cuti'); } catch(e){alert(e.message);} }} className="space-y-4"><select name="type" className="w-full border-2 p-3 rounded-xl bg-gray-50 font-bold text-xs uppercase tracking-widest outline-none focus:border-blue-500"><option>Cuti Bergaji</option><option>Cuti Tanpa Gaji</option><option>Cuti Sakit (MC)</option><option>Cuti Kecemasan</option></select><input type="date" name="date" min={today} className="w-full border-2 p-3 rounded-xl bg-gray-50 font-bold text-xs outline-none focus:border-blue-500" required /><textarea name="reason" placeholder="Alasan Cuti..." className="w-full border-2 p-3 rounded-xl bg-gray-50 h-24 resize-none font-bold text-xs outline-none focus:border-blue-500" required></textarea><button type="submit" className="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-green-700 uppercase text-xs tracking-widest transition-all active:scale-95">Hantar Permohonan</button></form></div>
                        )}

                        {tab === 'rekod_cuti' && (
                            <div className="space-y-4 uppercase">
                                <h2 className="font-black text-gray-800 uppercase tracking-widest text-sm">Rekod Cuti Saya</h2>
                                {leaves.filter(l => l.userId === currentUser.id).length === 0 ? <p className="text-center text-gray-300 py-10 font-bold text-xs italic">Tiada rekod.</p> :
                                leaves.filter(l => l.userId === currentUser.id).slice().reverse().map((l, i) => (
                                    <div key={i} className="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center transition-all hover:bg-gray-50/50"><div><h3 className="font-black text-gray-800 text-xs">{l.type}</h3><p className="text-[10px] text-gray-400 font-bold mt-0.5">{l.date}</p></div><span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${l.status==='Lulus'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}`}>{l.status}</span></div>
                                ))}
                            </div>
                        )}

                        {tab === 'umum' && (
                            <div className="bg-white p-7 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                                <h2 className="font-black text-gray-800 border-b pb-4 uppercase tracking-widest text-sm flex items-center gap-2"><IconCalendar className="text-blue-500"/> Jadual Cuti Umum</h2>
                                <div className="grid grid-cols-1 gap-2">
                                    {publicHolidays2026.map(ph => (
                                        <div key={ph.id} className="flex gap-5 p-3 hover:bg-gray-50 rounded-2xl transition-all uppercase"><div className="w-10 h-10 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center font-black text-[10px] shrink-0">{ph.id}</div><div><p className="font-black text-[12px] text-gray-800 leading-tight">{ph.event}</p><p className="text-[10px] text-gray-400 font-bold tracking-widest mt-0.5">{ph.dateStr}</p></div></div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
