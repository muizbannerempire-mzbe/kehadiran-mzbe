        const IconCalendar = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;

        const IconSettings = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconMap = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>;

        const publicHolidays2026 = [
            { id: 1, dateStr: '17 Januari (Sabtu)', event: 'Israk Mikraj' },
            { id: 2, dateStr: '17 Feb (Selasa)', event: 'Tahun Baru Cina' },

            { id: 5, dateStr: '22 Mac (Ahad)', event: 'Hari Raya Aidilfitri' },

            { id: 7, dateStr: '27 Mei (Rabu)', event: 'Hari Raya Haji' },

            { id: 9, dateStr: '1 Jun (Isnin)', event: 'Hari Keputeraan Agong' },

        const firebaseConfig = {

            projectId: "kehadiran-web",

        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);

            const [leaves, setLeaves] = useState([]);
            const [attendances, setAttendances] = useState([]);
            const [specialRequests, setSpecialRequests] = useState([]); 
            const [dbUsers, setDbUsers] = useState([]);

            const staticAdmins = [
                { id: 'ADMIN', password: 'tatlim82', name: 'SUPER ADMIN MBE', role: 'admin' },
                { id: 'MZBEBOSS001', password: 'admin', name: 'MUIZZUDDIN BIN AB.LLAH', role: 'admin' }
            ];

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error(e));
                const unsubscribe = auth.onAuthStateChanged(u => setFirebaseUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;
                const unsubSettings = db.collection('settings').doc('config').onSnapshot(doc => {
                    if(doc.exists) setSystemSettings(prev => ({ ...prev, ...doc.data() }));
                });
                const unsubLeaves = db.collection('leaves').onSnapshot(s => setLeaves(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubAtt = db.collection('attendances').onSnapshot(s => {
                    setAttendances(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsDbReady(true);
                });
                const unsubReq = db.collection('special_requests').onSnapshot(s => setSpecialRequests(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubUsers = db.collection('users').onSnapshot(s => setDbUsers(s.docs.map(d => ({ id: d.id, ...d.data() }))));

            }, [firebaseUser]);

                const cleanPass = passwordInput.trim();

                    {size === 'large' && <div className="text-center"><h1 className="text-2xl font-black text-gray-800 tracking-tight leading-none">MUIZ BANNER</h1><p className="text-sm font-bold text-gray-500 uppercase tracking-widest">Empire</p></div>}
                </div>

                            <div><label className="block text-sm font-bold text-gray-700 mb-1">Kata Laluan</label><input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 outline-none focus:border-blue-500 transition-all" required /></div>

            return currentUser.role === 'admin' ?

        // ==========================================
        // ADMIN DASHBOARD
        // ==========================================
        function AdminDashboard({ currentUser, setCurrentUser, leaves, attendances, specialRequests, dbUsers, staticAdmins, systemSettings, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [analisaPeriod, setAnalisaPeriod] = useState('Bulan Ini');
            const [analisaUser, setAnalisaUser] = useState('ALL');
            const [newStaf, setNewStaf] = useState({ name: '', id: '', password: '' });

            const updateSettings = async (newData) => {
                try { await db.collection('settings').doc('config').set(newData, { merge: true }); } catch (e) { alert(e.message); }
            };

                updateSettings({ clockOutTime: systemSettings.clockOutTime === '17:00' ? '16:30' : '17:00' });
            };

            const toggleBypass = () => {
                updateSettings({ bypassGps: !systemSettings.bypassGps });
            };

            const setStoreLocationToCurrent = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        updateSettings({ storeLat: pos.coords.latitude, storeLng: pos.coords.longitude });
                        alert("Lokasi kedai berjaya dikemaskini ke lokasi anda sekarang!");
                    });
                }
            };

            const allPekerja = [...dbUsers, ...staticAdmins].filter(u => u.role === 'pekerja' || u.id === 'MZBEBOSS001');

            return (
                <div className="min-h-screen bg-gray-50 pb-20 no-print">
                    <div className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-3"><BrandLogo size="small" /><div><h1 className="font-bold">Panel Admin</h1><p className="text-[10px] opacity-80">{currentUser.name}</p></div></div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-blue-700 rounded-full hover:bg-blue-800"><IconLogOut size={18} /></button>
                    </div>

                    <div className="p-4 max-w-5xl mx-auto space-y-6">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-x-auto hide-scroll border border-gray-100">
                            {['kehadiran', 'analisa', 'kebenaran', 'staf', 'umum', 'tetapan'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`flex-none px-6 py-3 text-xs font-black uppercase transition-all ${tab === t ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-600' : 'text-gray-400'}`}>
                                    {t === 'kebenaran' && specialRequests.filter(r => r.status === 'Pending').length > 0 && "🔴 "}{t}
                                </button>
                            ))}
                        </div>

                        {tab === 'staf' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h2 className="font-black text-gray-800 uppercase flex items-center gap-2 mb-4"><IconUserPlus className="text-blue-500"/> Tambah Staf</h2>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        const cid = newStaf.id.trim().toUpperCase();
                                        await db.collection('users').doc(cid).set({ ...newStaf, id: cid, role: 'pekerja' });
                                        setNewStaf({ name: '', id: '', password: '' });
                                        alert("Berjaya!");
                                    }} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <input type="text" placeholder="Nama" value={newStaf.name} onChange={e => setNewStaf({...newStaf, name: e.target.value})} className="p-3 border rounded-xl bg-gray-50 outline-none font-bold" required />
                                        <input type="text" placeholder="ID" value={newStaf.id} onChange={e => setNewStaf({...newStaf, id: e.target.value})} className="p-3 border rounded-xl bg-gray-50 outline-none uppercase font-bold" required />
                                        <input type="text" placeholder="Pass" value={newStaf.password} onChange={e => setNewStaf({...newStaf, password: e.target.value})} className="p-3 border rounded-xl bg-gray-50 outline-none font-bold" required />
                                        <button type="submit" className="bg-blue-600 text-white font-black py-3 rounded-xl uppercase">Daftar</button>
                                    </form>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h2 className="font-black text-gray-800 uppercase flex items-center gap-2 mb-4"><IconUser className="text-blue-500"/> Senarai Staf</h2>
                                    <div className="overflow-x-auto"><table className="w-full text-left border-collapse"><thead><tr className="bg-gray-50 text-xs text-gray-400 font-black uppercase"><th className="p-4">Nama</th><th className="p-4 text-center">ID / Password</th><th className="p-4 text-center">Aksi</th></tr></thead>
                                    <tbody>{dbUsers.map(u => (<tr key={u.id} className="border-b border-gray-50"><td className="p-4 font-bold text-gray-700 text-xs">{u.name}</td><td className="p-4 text-center text-xs font-mono">{u.id} / {u.password}</td><td className="p-4 text-center"><button onClick={async () => { if(confirm("Padam staf?")) await db.collection('users').doc(u.id).delete(); }} className="text-red-500 p-2"><IconTrash2 size={18}/></button></td></tr>))}</tbody></table></div>
                                </div>
                            </div>
                        )}

                        {tab === 'tetapan' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-6">
                                <h2 className="font-black text-gray-800 uppercase text-sm border-b pb-4">Konfigurasi Kedai</h2>
                                <div className="p-5 bg-blue-50 rounded-2xl border border-blue-100 space-y-4">
                                    <div className="flex items-center justify-between">
                                        <div><p className="text-xs font-black text-blue-800 uppercase tracking-widest">Waktu Balik Rasmi</p></div>
                                        <button onClick={toggleClockOutTime} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-black text-lg shadow-xl uppercase">{systemSettings.clockOutTime === '17:00' ? '5:00 PM' : '4:30 PM'}</button>
                                    </div>
                                    <div className="pt-4 border-t border-blue-100">
                                        <p className="text-xs font-black text-blue-800 uppercase tracking-widest mb-2">Lokasi Kedai (Radius 150m)</p>

        // ==========================================
        // EMPLOYEE DASHBOARD
        // ==========================================
        function EmployeeDashboard({ currentUser, setCurrentUser, leaves, attendances, specialRequests, systemSettings, BrandLogo }) {
            const [tab, setTab] = useState('kehadiran');
            const [reqModal, setReqModal] = useState({ show: false, type: '' });
            const [reqReason, setReqReason] = useState('');
            const [modalMsg, setModalMsg] = useState(null);
            
            const today = new Date().toLocaleDateString('en-CA');
            const att = attendances.find(a => a.userId === currentUser.id && a.date === today) || { clockIn: null, clockOut: null };

            // HAIVERSINE DISTANCE CALCULATION
            const getDistanceInMeters = (lat1, lon1, lat2, lon2) => {
                const R = 6371e3; 
                const p1 = lat1 * Math.PI/180;
                const p2 = lat2 * Math.PI/180;
                const dp = (lat2 - lat1) * Math.PI/180;
                const dl = (lon2 - lon1) * Math.PI/180;
                const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            };

            const verifyLocationAndExecute = (actionName, callback) => {
                if(systemSettings.bypassGps) return callback();
                
                setModalMsg({ type: 'info', text: 'Mengesahkan lokasi...' });
                
                navigator.geolocation.getCurrentPosition(p => {
                    const dist = getDistanceInMeters(
                        p.coords.latitude, 
                        p.coords.longitude, 
                        systemSettings.storeLat || 5.76981, 
                        systemSettings.storeLng || 102.56142
                    );
                    
                    if(dist <= 150) {
                        setModalMsg(null);
                        callback();
                    } else {
                        setModalMsg({ type: 'error', text: `Jarak: ${Math.round(dist)}m. Anda mesti dalam 150m radius dari Muiz Banner Empire!` });
                    }
                }, () => setModalMsg({ type: 'error', text: 'Gagal mendapatkan akses GPS. Sila hidupkan "Location" pada telefon anda.' }), 
                { enableHighAccuracy: true });
            };

            const record = async (field) => {
                const time = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit', hour12: true });
                try {
                    if (att.id) await db.collection('attendances').doc(att.id).update({ [field]: time });
                    else await db.collection('attendances').add({ userId: currentUser.id, date: today, [field]: time, clockIn:null, clockOut:null, breakOut:null, breakIn:null, otIn:null, otOut:null });
                    setModalMsg({ type: 'success', text: `Berjaya rekod: ${time}` });
                    setTimeout(() => setModalMsg(null), 3000);
                } catch (e) { alert(e.message); }
            };

            const checkTimeLimit = (action) => {
                if (currentUser.id === 'MZBEBOSS001' || currentUser.id === 'ADMIN') return true;
                const now = new Date();
                const minutes = now.getHours() * 60 + now.getMinutes();
                if (action === 'clockIn' && minutes > (8 * 60 + 15)) {
                    const req = specialRequests.find(r => r.userId === currentUser.id && r.date === today && r.type === 'Masuk Lambat');
                    if (!req) { setReqModal({ show: true, type: 'Masuk Lambat' }); return false; }
                    if (req.status === 'Pending') { setModalMsg({ type: 'error', text: 'Menunggu kelulusan Admin.' }); return false; }
                } else if (action === 'clockOut') {
                    const limit = systemSettings.clockOutTime === '17:00' ? 17 * 60 : 16 * 60 + 30;
                    if (minutes < limit) {
                        const req = specialRequests.find(r => r.userId === currentUser.id && r.date === today && r.type === 'Keluar Awal');
                        if (!req) { setReqModal({ show: true, type: 'Keluar Awal' }); return false; }
                    }
                }
                return true;
            };

            return (
                <div className="min-h-screen bg-gray-50 pb-20 relative">
                    <div className="bg-green-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
                        <div className="flex items-center gap-3"><BrandLogo size="small" /><div><h1 className="font-bold text-sm truncate w-40">{currentUser.name}</h1><p className="text-[10px] opacity-80 uppercase font-bold tracking-widest">Portal Pekerja</p></div></div>
                        <button onClick={() => setCurrentUser(null)} className="p-2 bg-green-700 rounded-full"><IconLogOut size={16} /></button>
                    </div>

                    {modalMsg && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-in zoom-in">
                                {modalMsg.type==='error'&&<IconXCircle className="mx-auto text-red-500 mb-4" size={56}/>}
                                {modalMsg.type==='success'&&<IconCheckCircle className="mx-auto text-green-500 mb-4" size={56}/>}
                                {modalMsg.type==='info'&&<IconMapPin className="mx-auto text-blue-500 mb-4 animate-bounce" size={56}/>}
                                <p className="font-bold text-lg mb-6 leading-snug">{modalMsg.text}</p>
                                {modalMsg.type !== 'info' && <button onClick={()=>setModalMsg(null)} className="w-full bg-gray-900 text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">Tutup</button>}
                            </div>
                        </div>
                    )}

                    {reqModal.show && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-7 w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-black uppercase text-gray-800">{reqModal.type}</h2>
                                <p className="text-[11px] text-gray-500 mt-2 font-medium">Radius 150m akan disemak selepas rayuan dihantar.</p>
                                <form onSubmit={async (e) => { e.preventDefault(); try { await db.collection('special_requests').add({ userId: currentUser.id, type: reqModal.type, date: today, reason: reqReason, status: 'Pending', timestamp: Date.now() }); setReqModal({show:false,type:''}); setReqReason(''); setModalMsg({type:'success',text:'Rayuan dihantar!'}); } catch(e){alert(e.message);} }} className="space-y-4 mt-4">
                                    <textarea value={reqReason} onChange={e => setReqReason(e.target.value)} placeholder="Sebab rayuan..." className="w-full border-2 p-4 rounded-2xl h-28 bg-gray-50 outline-none focus:border-orange-500 text-sm" required></textarea>
                                    <div className="flex gap-2"><button type="submit" className="flex-1 bg-orange-500 text-white py-4 rounded-xl font-black uppercase text-xs">Hantar</button><button type="button" onClick={()=>setReqModal({show:false,type:''})} className="flex-1 bg-gray-100 text-gray-400 py-4 rounded-xl font-black uppercase text-xs">Batal</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-md mx-auto space-y-6 mt-2">
                        <div className="flex bg-white rounded-xl shadow-sm overflow-x-auto hide-scroll border border-gray-100">
                            {['kehadiran', 'mohon_cuti', 'rekod_cuti', 'umum'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`flex-none px-6 py-4 text-[10px] font-black uppercase tracking-widest transition-all ${tab===t?'bg-green-50 text-green-600 border-b-2 border-green-600':'text-gray-400'}`}>{t.replace('_',' ')}</button>
                            ))}
                        </div>

                        {tab === 'kehadiran' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1.5 bg-green-500"></div>
                                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Mesti dlm radius 150m untuk Transaksi</p>
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight">{new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long' })}</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button disabled={att.clockIn} onClick={() => { if(checkTimeLimit('clockIn')) verifyLocationAndExecute('Masuk', () => record('clockIn')); }} className={`p-6 rounded-3xl flex flex-col items-center gap-3 transition-all shadow-lg ${att.clockIn ? 'bg-gray-50 text-gray-300' : 'bg-green-500 text-white active:scale-90'}`}><IconClock size={36}/><span className="font-black text-xs uppercase">Clock In</span>{att.clockIn && <span className="text-[11px] font-black bg-white/20 px-2 py-0.5 rounded-full">{att.clockIn}</span>}</button>
                                    <button disabled={!att.clockIn || att.clockOut} onClick={() => { if(checkTimeLimit('clockOut')) verifyLocationAndExecute('Keluar', () => record('clockOut')); }} className={`p-6 rounded-3xl flex flex-col items-center gap-3 transition-all shadow-lg ${(!att.clockIn || att.clockOut) ? 'bg-gray-50 text-gray-300' : 'bg-red-500 text-white active:scale-90'}`}><IconLogOut size={36}/><span className="font-black text-xs uppercase">Clock Out</span>{att.clockOut && <span className="text-[11px] font-black bg-white/20 px-2 py-0.5 rounded-full">{att.clockOut}</span>}</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-2">
                                    <button disabled={!att.clockIn || att.breakOut} onClick={() => verifyLocationAndExecute('Keluar Rehat', () => record('breakOut'))} className={`p-4 rounded-xl flex flex-col items-center gap-1 transition-all shadow-md ${(!att.clockIn || att.breakOut) ? 'bg-gray-100 text-gray-300' : 'bg-yellow-500 text-white active:scale-95'}`}><span className="text-[10px] font-black uppercase">Keluar Rehat</span>{att.breakOut && <span className="text-[10px]">{att.breakOut}</span>}</button>
                                    <button disabled={!att.breakOut || att.breakIn} onClick={() => verifyLocationAndExecute('Masuk Rehat', () => record('breakIn'))} className={`p-4 rounded-xl flex flex-col items-center gap-1 transition-all shadow-md ${(!att.breakOut || att.breakIn) ? 'bg-gray-100 text-gray-300' : 'bg-blue-500 text-white active:scale-95'}`}><span className="text-[10px] font-black uppercase">Masuk Rehat</span>{att.breakIn && <span className="text-[10px]">{att.breakIn}</span>}</button>
                                </div>
                                <div className="bg-purple-50 p-4 rounded-3xl border border-purple-100 grid grid-cols-2 gap-4">
                                    <button disabled={att.otIn} onClick={() => verifyLocationAndExecute('OT Masuk', () => record('otIn'))} className={`p-3 rounded-xl text-[10px] font-black uppercase transition-all ${att.otIn ? 'bg-white border text-gray-300' : 'bg-purple-600 text-white shadow-md'}`}>OT Masuk {att.otIn && `(${att.otIn})`}</button>
                                    <button disabled={!att.otIn || att.otOut} onClick={() => verifyLocationAndExecute('OT Keluar', () => record('otOut'))} className={`p-3 rounded-xl text-[10px] font-black uppercase transition-all ${(!att.otIn || att.otOut) ? 'bg-white border text-gray-300' : 'bg-purple-800 text-white shadow-md'}`}>OT Keluar {att.otOut && `(${att.otOut})`}</button>
                                </div>
                            </div>
                        )}
                        {/* Tab Cuti, Umum dikekalkan logik sedia ada */}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
